<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 0 0" width="0" height="0" style="display:none">
  <!-- Bibliothèque de symboles modulaires du gladiateur.
       Utilisation : <svg viewBox="0 0 120 180"><use href="gladiator_sprites.svg#body-normal"/></svg> -->

  <!-- === Morphologies === -->
  <symbol id="body-slim" viewBox="0 0 120 180">
    <rect x="46" y="68" width="28" height="60" fill="currentColor" stroke="#2a1a10" stroke-width="2" rx="6"/>
    <rect x="40" y="72" width="6" height="50" fill="#d89c77" stroke="#2a1a10" stroke-width="1.5" rx="4"/>
    <rect x="74" y="72" width="6" height="50" fill="#d89c77" stroke="#2a1a10" stroke-width="1.5" rx="4"/>
    <rect x="50" y="120" width="9" height="40" fill="#d89c77" stroke="#2a1a10" stroke-width="1.5" rx="3"/>
    <rect x="61" y="120" width="9" height="40" fill="#d89c77" stroke="#2a1a10" stroke-width="1.5" rx="3"/>
  </symbol>

  <symbol id="body-normal" viewBox="0 0 120 180">
    <rect x="42" y="68" width="36" height="60" fill="currentColor" stroke="#2a1a10" stroke-width="2" rx="6"/>
    <rect x="34" y="72" width="8" height="50" fill="#d89c77" stroke="#2a1a10" stroke-width="1.5" rx="4"/>
    <rect x="78" y="72" width="8" height="50" fill="#d89c77" stroke="#2a1a10" stroke-width="1.5" rx="4"/>
    <rect x="46" y="120" width="12" height="40" fill="#d89c77" stroke="#2a1a10" stroke-width="1.5" rx="3"/>
    <rect x="62" y="120" width="12" height="40" fill="#d89c77" stroke="#2a1a10" stroke-width="1.5" rx="3"/>
  </symbol>

  <symbol id="body-bulky" viewBox="0 0 120 180">
    <rect x="37" y="68" width="46" height="60" fill="currentColor" stroke="#2a1a10" stroke-width="2" rx="6"/>
    <rect x="27" y="72" width="10" height="50" fill="#d89c77" stroke="#2a1a10" stroke-width="1.5" rx="4"/>
    <rect x="83" y="72" width="10" height="50" fill="#d89c77" stroke="#2a1a10" stroke-width="1.5" rx="4"/>
    <rect x="42" y="120" width="16" height="40" fill="#d89c77" stroke="#2a1a10" stroke-width="1.5" rx="3"/>
    <rect x="62" y="120" width="16" height="40" fill="#d89c77" stroke="#2a1a10" stroke-width="1.5" rx="3"/>
  </symbol>

  <!-- === Coiffures === -->
  <symbol id="hair-short" viewBox="0 0 120 180">
    <path d="M38 42 Q40 20 60 18 Q80 20 82 42 Q78 28 60 26 Q42 28 38 42 Z" fill="#3a1f0a" stroke="#2a1a10" stroke-width="1.5"/>
  </symbol>
  <symbol id="hair-mohawk" viewBox="0 0 120 180">
    <path d="M40 36 Q60 14 80 36 Q60 26 40 36 Z" fill="#c77a2a" stroke="#2a1a10" stroke-width="1.5"/>
  </symbol>
  <symbol id="hair-spiky" viewBox="0 0 120 180">
    <path d="M40 40 Q60 10 80 40 L78 48 Q60 30 42 48 Z" fill="#e6c35a" stroke="#2a1a10" stroke-width="1.5"/>
    <path d="M52 22 L58 14 L62 22 L68 14 L74 24" fill="none" stroke="#e6c35a" stroke-width="3" stroke-linecap="round"/>
  </symbol>
  <symbol id="hair-long" viewBox="0 0 120 180">
    <path d="M42 44 Q42 22 60 20 Q78 22 78 44 L76 30 L70 22 L60 20 L50 22 L44 30 Z" fill="#1a0f08" stroke="#2a1a10" stroke-width="1.5"/>
  </symbol>

  <!-- === Têtes (3 teintes de peau) === -->
  <symbol id="head-pale" viewBox="0 0 120 180">
    <rect x="55" y="60" width="10" height="10" fill="#f3c2a6" stroke="#2a1a10" stroke-width="1.5"/>
    <circle cx="60" cy="42" r="22" fill="#f3c2a6" stroke="#2a1a10" stroke-width="2"/>
    <circle cx="52" cy="44" r="2" fill="#1a0f08"/>
    <circle cx="68" cy="44" r="2" fill="#1a0f08"/>
    <path d="M54 54 Q60 58 66 54" stroke="#2a1a10" stroke-width="1.5" fill="none"/>
  </symbol>
  <symbol id="head-tan" viewBox="0 0 120 180">
    <rect x="55" y="60" width="10" height="10" fill="#d89c77" stroke="#2a1a10" stroke-width="1.5"/>
    <circle cx="60" cy="42" r="22" fill="#d89c77" stroke="#2a1a10" stroke-width="2"/>
    <circle cx="52" cy="44" r="2" fill="#1a0f08"/>
    <circle cx="68" cy="44" r="2" fill="#1a0f08"/>
    <path d="M54 54 Q60 58 66 54" stroke="#2a1a10" stroke-width="1.5" fill="none"/>
  </symbol>
  <symbol id="head-dark" viewBox="0 0 120 180">
    <rect x="55" y="60" width="10" height="10" fill="#8b5a3c" stroke="#2a1a10" stroke-width="1.5"/>
    <circle cx="60" cy="42" r="22" fill="#8b5a3c" stroke="#2a1a10" stroke-width="2"/>
    <circle cx="52" cy="44" r="2" fill="#efe3d0"/>
    <circle cx="68" cy="44" r="2" fill="#efe3d0"/>
    <path d="M54 54 Q60 58 66 54" stroke="#2a1a10" stroke-width="1.5" fill="none"/>
  </symbol>

  <!-- === Poses superposées (overlay) === -->
  <symbol id="pose-neutral" viewBox="0 0 120 180"></symbol>
  <symbol id="pose-attack" viewBox="0 0 120 180">
    <!-- Bras en avant brandissant une arme -->
    <rect x="78" y="58" width="8" height="40" fill="#d89c77" stroke="#2a1a10" stroke-width="1.5" transform="rotate(-30 82 78)" rx="4"/>
    <rect x="90" y="30" width="4" height="36" fill="#e8e3d4" stroke="#1a1410" stroke-width="1.5" transform="rotate(-25 92 48)"/>
  </symbol>
  <symbol id="pose-defense" viewBox="0 0 120 180">
    <!-- Bouclier levé -->
    <path d="M80 70 L96 80 L96 110 Q88 120 80 110 Z" fill="#8b5a3c" stroke="#1a1410" stroke-width="1.5"/>
    <rect x="87" y="86" width="4" height="16" fill="#d4a355"/>
  </symbol>
  <symbol id="pose-ko" viewBox="0 0 120 180">
    <!-- X sur les yeux -->
    <path d="M48 40 L56 48 M56 40 L48 48" stroke="#1a0f08" stroke-width="2"/>
    <path d="M64 40 L72 48 M72 40 L64 48" stroke="#1a0f08" stroke-width="2"/>
  </symbol>
</svg>
