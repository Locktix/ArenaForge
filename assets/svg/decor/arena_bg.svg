<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#2a1814"/>
      <stop offset="0.6" stop-color="#4a2a1a"/>
      <stop offset="1" stop-color="#6b3a22"/>
    </linearGradient>
    <linearGradient id="sand" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#8b5a3c"/>
      <stop offset="1" stop-color="#5a3620"/>
    </linearGradient>
    <pattern id="stones" x="0" y="0" width="40" height="20" patternUnits="userSpaceOnUse">
      <rect width="40" height="20" fill="#5a4030"/>
      <path d="M0 10 L20 10 L20 20 L0 20 Z" fill="#4a3020" stroke="#2a1a10" stroke-width="1"/>
      <path d="M20 0 L40 0 L40 10 L20 10 Z" fill="#4a3020" stroke="#2a1a10" stroke-width="1"/>
      <path d="M0 0 L20 0 L20 10 L0 10 Z" fill="#6a4838" stroke="#2a1a10" stroke-width="1"/>
      <path d="M20 10 L40 10 L40 20 L20 20 Z" fill="#6a4838" stroke="#2a1a10" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Ciel -->
  <rect width="800" height="200" fill="url(#sky)"/>

  <!-- Gradins extérieurs (silhouettes) -->
  <g fill="#1a0f08" opacity="0.6">
    <path d="M0 140 L80 120 L160 130 L240 110 L320 125 L400 115 L480 130 L560 115 L640 125 L720 110 L800 130 L800 200 L0 200 Z"/>
  </g>

  <!-- Mur de pierre -->
  <rect x="0" y="160" width="800" height="60" fill="url(#stones)"/>

  <!-- Bannière -->
  <g transform="translate(360 120)">
    <rect x="0" y="0" width="80" height="40" fill="#9e2a1f" stroke="#2a1a10" stroke-width="2"/>
    <polygon points="0,40 40,56 80,40" fill="#9e2a1f" stroke="#2a1a10" stroke-width="2"/>
    <path d="M40 10 L50 20 L46 30 L34 30 L30 20 Z" fill="#d4a355" stroke="#2a1a10" stroke-width="1"/>
  </g>

  <!-- Sable / sol -->
  <rect y="200" width="800" height="120" fill="url(#sand)"/>
  <!-- Grains -->
  <g fill="#4a2a10" opacity="0.4">
    <circle cx="80"  cy="240" r="2"/>
    <circle cx="180" cy="260" r="2.5"/>
    <circle cx="260" cy="220" r="2"/>
    <circle cx="360" cy="250" r="2.5"/>
    <circle cx="450" cy="230" r="2"/>
    <circle cx="540" cy="260" r="3"/>
    <circle cx="640" cy="240" r="2"/>
    <circle cx="720" cy="220" r="2.5"/>
  </g>
  <!-- Taches de sang -->
  <g fill="#6b1810" opacity="0.6">
    <ellipse cx="200" cy="280" rx="20" ry="5"/>
    <ellipse cx="600" cy="290" rx="14" ry="4"/>
  </g>

  <!-- Torches -->
  <g transform="translate(40 100)">
    <rect x="-2" y="40" width="4" height="60" fill="#3d2414"/>
    <ellipse cx="0" cy="30" rx="8" ry="14" fill="#f0c170"/>
    <ellipse cx="0" cy="34" rx="5" ry="10" fill="#d6431e"/>
  </g>
  <g transform="translate(760 100)">
    <rect x="-2" y="40" width="4" height="60" fill="#3d2414"/>
    <ellipse cx="0" cy="30" rx="8" ry="14" fill="#f0c170"/>
    <ellipse cx="0" cy="34" rx="5" ry="10" fill="#d6431e"/>
  </g>
</svg>
